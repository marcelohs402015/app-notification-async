spring:
  application:
    name: app-notification-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/app_notification}
    username: ${SPRING_DATASOURCE_USERNAME:appuser}
    password: ${SPRING_DATASOURCE_PASSWORD:apppassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:appuser}
    password: ${SPRING_RABBITMQ_PASSWORD:apppassword}
  threads:
    virtual:
      enabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:7a9b2c4d6e8f1a3b5c7d9e2f4a6b8c1d3e5f7a9b2c4d6e8f1a3b5c7d9e2f4a6b}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.appnotification: INFO
    org.springframework.amqp: WARN
